<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://static.zeoseven.com/zsft/442/main/result.css" />
  <link href="https://fonts.googleapis.com/css2?family=Single+Day&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      font-family: "Maple Mono NF CN", monospace;
    }

    html[lang="ko"] * {
      font-family: "Single Day", cursive;
    }

    body {
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>
  <div class="w-[1400px] h-[720px] relative" id="background">
    <div id="grid-background" class="absolute inset-0 z-0 pointer-events-none"></div>

    <div class="w-[1400px] h-[720px] flex justify-between items-center px-20 relative z-10">
      <div class="w-[600px] h-[512px] flex flex-col justify-start gap-4 overflow-hidden">
        <!-- Updating 标识矩形块 - 放在课程标题上方 -->
        <div id="updating-badge" class="hidden mb-4">
          <div class="inline-block px-4 py-2 rounded-lg text-white font-black text-5xl border-2 border-black"
            style="background-color: black; font-family: 'Maple Mono NF CN', monospace;">
          </div>
        </div>

        <div id="course-title" class="text-black font-bold w-[600px] flex-1 flex items-center text-pretty" style="
              line-height: 1.2;
              text-shadow: -1px -1px 0 white, 1px -1px 0 white, -1px 1px 0 white, 1px 1px 0 white,
                2px 2px 4px rgba(0, 0, 0, 0.2);
            "></div>
      </div>
      <div class="w-[512px] h-[512px] justify-center items-center flex">
        <img id="course-image" class="w-[512px] h-[512px]" src="" />
      </div>
    </div>
  </div>

  <script>
    // 获取 URL 参数
    const urlParams = new URLSearchParams(window.location.search);
    const courseType = urlParams.get("course_type") || "normal";
    const courseName = urlParams.get("course_name") || "Linux for Noobs 基础入门";
    const lang = urlParams.get("lang") || "en";
    const status_text = urlParams.get("status_text");

    // 处理状态显示
    if (status_text) {
      const updatingBadge = document.getElementById("updating-badge");
      updatingBadge.children[0].textContent = status_text;
      updatingBadge.classList.remove("hidden");
    }

    // 处理图片 URL
    const imageUrl = urlParams.get("image_url") || "https://placehold.co/512x512";
    const imgElement = document.getElementById("course-image");

    // 如果是相对路径（以 ./ 或 ../ 开头），转换为相对于当前页面的绝对路径
    if (imageUrl.startsWith("./") || imageUrl.startsWith("../")) {
      const basePath = window.location.href.substring(0, window.location.href.lastIndexOf("/"));
      imgElement.src = new URL(imageUrl, basePath).href;
    } else {
      imgElement.src = imageUrl;
    }

    // 设置语言
    document.documentElement.lang = lang;

    // 处理背景颜色参数
    let backgroundColor = urlParams.get("bg_color") || "#f5b553";
    // 如果颜色值不包含 #，则添加
    if (backgroundColor && !backgroundColor.startsWith("#")) {
      backgroundColor = "#" + backgroundColor;
    }
    // 验证颜色值是否有效
    const isValidColor = /^#([0-9A-F]{3}){1,2}$/i.test(backgroundColor);
    // 如果无效则使用默认颜色
    if (!isValidColor) {
      backgroundColor = "#f5b553";
    }

    // 设置课程标题并根据字符长度调整字体大小
    const titleElement = document.getElementById("course-title");
    titleElement.textContent = courseName;

    // 根据文本长度动态调整字体大小
    function adjustFontSize(element, text) {
      const charCount = text.length;

      // 定义字体大小阶梯
      if (charCount <= 45) {
        // 默认大小
        element.style.fontSize = "clamp(24px, 5vw, 65px)";
      } else if (charCount <= 70) {
        // 稍小一点
        element.style.fontSize = "clamp(22px, 4.5vw, 55px)";
      } else if (charCount <= 100) {
        // 中等
        element.style.fontSize = "clamp(20px, 4vw, 45px)";
      } else if (charCount <= 150) {
        // 较小
        element.style.fontSize = "clamp(18px, 3.5vw, 35px)";
      } else {
        // 最小
        element.style.fontSize = "clamp(16px, 3vw, 25px)";
      }
    }

    // 应用字体大小调整
    adjustFontSize(titleElement, courseName);

    document.getElementById("background").style.backgroundColor = backgroundColor;

    // 生成背景和纹理的统一控制器
    function setupBackground() {
      const gridBg = document.getElementById("grid-background");
      
      // 1. 定义背景网格样式 (Grid Styles)
      const gridStyles = {
        // --- 正交网格类 (Orthogonal) ---
        solid: (opacity = 0.1) => {
          gridBg.style.opacity = opacity;
          gridBg.style.backgroundSize = "40px 40px";
          gridBg.style.backgroundImage = "linear-gradient(to right, black 1px, transparent 1px), linear-gradient(to bottom, black 1px, transparent 1px)";
        },
        dashed: (opacity = 0.12) => {
          gridBg.style.opacity = opacity;
          const svg = `<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="black" stroke-width="1" stroke-dasharray="4 2"/></svg>`;
          gridBg.style.backgroundImage = `url('data:image/svg+xml;base64,${btoa(svg)}')`;
          gridBg.style.backgroundSize = "auto";
        },
        dotted_line: (opacity = 0.15) => {
          gridBg.style.opacity = opacity;
          const svg = `<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="1 4" stroke-linecap="round"/></svg>`;
          gridBg.style.backgroundImage = `url('data:image/svg+xml;base64,${btoa(svg)}')`;
          gridBg.style.backgroundSize = "auto";
        },
        points: (opacity = 0.15) => {
          gridBg.style.opacity = opacity;
          const svg = `<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><circle cx="1" cy="1" r="1.5" fill="black"/></svg>`;
          gridBg.style.backgroundImage = `url('data:image/svg+xml;base64,${btoa(svg)}')`;
          gridBg.style.backgroundSize = "auto";
        },

        // --- 圆形/有机类 (Round/Organic) ---
        polka: (opacity = 0.1) => {
          gridBg.style.opacity = opacity;
          const svg = `<svg width="24" height="24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="2" fill="black"/></svg>`;
          gridBg.style.backgroundImage = `url('data:image/svg+xml;base64,${btoa(svg)}')`;
          gridBg.style.backgroundSize = "auto";
        },
        waves: (opacity = 0.1) => {
          gridBg.style.opacity = opacity;
          const svg = `<svg width="40" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M0 10 Q 10 0 20 10 T 40 10" fill="none" stroke="black" stroke-width="1.5"/></svg>`;
          gridBg.style.backgroundImage = `url('data:image/svg+xml;base64,${btoa(svg)}')`;
          gridBg.style.backgroundSize = "auto";
        },

        // --- 斜向/几何类 (Angled/Geometric) ---
        diagonal: (opacity = 0.08) => {
          gridBg.style.opacity = opacity;
          const svg = `<svg width="20" height="20" xmlns="http://www.w3.org/2000/svg"><path d="M-5 25 L25 -5 M0 20 L20 0 M-5 5 L5 -5 M15 25 L25 15" stroke="black" stroke-width="1.5"/></svg>`;
          gridBg.style.backgroundImage = `url('data:image/svg+xml;base64,${btoa(svg)}')`;
          gridBg.style.backgroundSize = "auto";
        },
        diamond: (opacity = 0.08) => {
          gridBg.style.opacity = opacity;
          const svg = `<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="0" width="28" height="28" transform="rotate(45 20 0)" fill="none" stroke="black" stroke-width="1"/></svg>`;
          gridBg.style.backgroundImage = `url('data:image/svg+xml;base64,${btoa(svg)}')`;
          gridBg.style.backgroundSize = "auto";
        }
      };

      // 2. 选择逻辑
      const urlParams = new URLSearchParams(window.location.search);
      let selectedGrid = urlParams.get("grid");

      // 随机选择背景网格 (Grid)
      const gridKeys = Object.keys(gridStyles);
      if (!selectedGrid || !gridStyles[selectedGrid]) {
        selectedGrid = gridKeys[Math.floor(Math.random() * gridKeys.length)];
      }

      console.log(`Rendering - Grid: ${selectedGrid}`);

      // 3. 渲染
      gridStyles[selectedGrid]();     // 渲染背景
    }

    setupBackground();
  </script>
</body>

</html>
